name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  crates-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Verify version matches tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$VER" ]; then
            echo "Tag v$TAG does not match Cargo.toml version $VER"
            exit 1
          fi
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    needs: crates-publish
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: wikigen-linux-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: wikigen-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: wikigen-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: wikigen-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/wikigen.exe "${{ matrix.binary }}"
          else
            cp target/${{ matrix.target }}/release/wikigen "${{ matrix.binary }}"
          fi
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wikigen-*
          merge-multiple: true
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "wikigen-*"
          generateReleaseNotes: true

  npm-publish:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Set version from tag
        working-directory: packages/npm
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -i "s/\"version\": \"[0-9.]*\"/\"version\": \"$VERSION\"/" package.json
          sed -i "s/const VERSION = \"[0-9.]*\"/const VERSION = \"$VERSION\"/" install.js
      - run: npm publish --access public
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
